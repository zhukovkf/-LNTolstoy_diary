name: Daily Tolstoy post

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Post next diary entry
        run: python3 post_next_entry.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: '@LNTolstoy_diary'

      - name: Save updated state back to the repo
        run: |
          git config user.name "tolstoy-bot"
          git config user.email "tolstoy-bot@users.noreply.github.com"
          git add state.json
          git diff --quiet --cached || git commit -m "chore: update posting state"
          git push
